name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    # BUILD-011: `npm ci` runs every transitive's preinstall/install/postinstall
    # script with `id-token: write` and `NPM_TOKEN` in scope. A single
    # compromised transitive (next event-stream) could exfiltrate the publish
    # token via a `postinstall` exec. `--ignore-scripts` blocks the entire
    # lifecycle, then we rebuild ONLY the natives mailpouch actually depends on.
    # If you add another native dep (e.g. `bcrypt`, `keytar`), it must be added
    # to the `npm rebuild` line here, or its native binary won't be built.
    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Rebuild trusted native dependencies
      run: npm rebuild better-sqlite3 @napi-rs/keyring

    - name: Run type checking
      run: npm run typecheck

    - name: Run linter
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build project
      run: npm run build

    - name: Publish to npm
      # Skip gracefully if this version is already published (manual publish case)
      run: |
        VERSION=$(node -p "require('./package.json').version")
        NAME=$(node -p "require('./package.json').name")
        if npm view "${NAME}@${VERSION}" version --registry https://registry.npmjs.org 2>/dev/null | grep -q "${VERSION}"; then
          echo "Version ${VERSION} already published to npm — skipping"
        else
          npm publish --provenance --access public
        fi
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gpr:
    runs-on: ubuntu-latest
    # Run independently — does not depend on publish-npm so GitHub Packages
    # always gets the release even if npm publish is skipped or fails.

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20.x'
        registry-url: 'https://npm.pkg.github.com'
        cache: 'npm'

    # BUILD-011: `npm ci` runs every transitive's preinstall/install/postinstall
    # script with `id-token: write` and `NPM_TOKEN` in scope. A single
    # compromised transitive (next event-stream) could exfiltrate the publish
    # token via a `postinstall` exec. `--ignore-scripts` blocks the entire
    # lifecycle, then we rebuild ONLY the natives mailpouch actually depends on.
    # If you add another native dep (e.g. `bcrypt`, `keytar`), it must be added
    # to the `npm rebuild` line here, or its native binary won't be built.
    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Rebuild trusted native dependencies
      run: npm rebuild better-sqlite3 @napi-rs/keyring

    - name: Build project
      run: npm run build

    - name: Publish to GitHub Packages
      # GitHub Packages npm requires scoped packages. Temporarily rename to
      # @chandshy/mailpouch for this publish only — does not affect npmjs.com.
      run: |
        VERSION=$(node -p "require('./package.json').version")
        if npm view "@chandshy/mailpouch@${VERSION}" version --registry https://npm.pkg.github.com 2>/dev/null | grep -q "${VERSION}"; then
          echo "Version ${VERSION} already published to GitHub Packages — skipping"
        else
          # BUILD-023: back up package.json, rename for the scoped GPR publish,
          # then restore — so any later step in this job sees the original,
          # unmutated workspace.
          cp package.json /tmp/pkg.bak
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.name = '@chandshy/mailpouch';
            p.publishConfig = { registry: 'https://npm.pkg.github.com', access: 'public' };
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
          "
          npm publish
          mv /tmp/pkg.bak package.json
        fi
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
