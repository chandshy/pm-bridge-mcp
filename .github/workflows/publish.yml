name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run type checking
      run: npm run typecheck

    - name: Run linter
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build project
      run: npm run build

    - name: Publish to npm
      # Skip gracefully if this version is already published (manual publish case)
      run: |
        VERSION=$(node -p "require('./package.json').version")
        NAME=$(node -p "require('./package.json').name")
        if npm view "${NAME}@${VERSION}" version --registry https://registry.npmjs.org 2>/dev/null | grep -q "${VERSION}"; then
          echo "Version ${VERSION} already published to npm — skipping"
        else
          npm publish --provenance --access public
        fi
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gpr:
    runs-on: ubuntu-latest
    # Run independently — does not depend on publish-npm so GitHub Packages
    # always gets the release even if npm publish is skipped or fails.

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Publish to GitHub Packages
      # GitHub Packages npm requires scoped packages. Temporarily rename to
      # @chandshy/mailpouch for this publish only — does not affect npmjs.com.
      run: |
        VERSION=$(node -p "require('./package.json').version")
        if npm view "@chandshy/mailpouch@${VERSION}" version --registry https://npm.pkg.github.com 2>/dev/null | grep -q "${VERSION}"; then
          echo "Version ${VERSION} already published to GitHub Packages — skipping"
        else
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.name = '@chandshy/mailpouch';
            p.publishConfig = { registry: 'https://npm.pkg.github.com', access: 'public' };
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
          "
          npm publish
        fi
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
